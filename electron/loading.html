<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Brain'IAC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
      user-select: none;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    .sub {
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e293b;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .status-box {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      min-height: 3.5rem;
    }
    .status {
      font-size: 0.82rem;
      color: #94a3b8;
      transition: opacity 0.3s;
    }
    .status.highlight {
      color: #a78bfa;
      font-weight: 600;
    }
    .progress-wrap {
      width: 220px;
      height: 3px;
      background: #1e293b;
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }
    .progress-wrap.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .notice {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #1e293b;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }
    .notice.visible { color: #334155; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">Brain'IAC</div>
  <div class="sub">Index.Augment.Converse</div>
  <div class="spinner"></div>

  <div class="status-box">
    <div class="status" id="status">Iniciando backend...</div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div class="notice" id="notice">
    Na primeira execução, componentes adicionais podem ser baixados automaticamente
    para habilitar o Agente IA local. Isso acontece apenas uma vez.
  </div>

  <script>
    window.setStatus = function(msg, highlight) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (highlight ? ' highlight' : '');
    };
    window.setProgress = function(pct) {
      const wrap = document.getElementById('progress-wrap');
      const bar  = document.getElementById('progress-bar');
      if (pct >= 0) {
        wrap.classList.add('visible');
        bar.style.width = pct + '%';
      } else {
        wrap.classList.remove('visible');
      }
    };
    window.setNotice = function(msg) {
      const el = document.getElementById('notice');
      el.textContent = msg;
      el.classList.add('visible');
    };
  </script>
</body>
</html>
